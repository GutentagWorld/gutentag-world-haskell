name: Gutentag, World!

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: haskell-actions/setup@v2

      - name: Run
        run: runhaskell app/Main.hs

      - name: Verify output
        run: bash test.sh
